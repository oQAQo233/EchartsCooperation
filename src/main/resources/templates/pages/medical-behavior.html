<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临床与行为分析 - 睡眠健康平台</title>

    <!-- 引入项目中已有的样式文件 -->
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .chart-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px var(--shadow-color);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <ul class="sidebar-menu">
        <li>
            <a href="/sleep/dashboard">
                <i class="bi bi-grid-1x2 icon"></i>
                数据仪表盘
            </a>
        </li>
        <li>
            <a href="/sleep/distribution">
                <i class="bi bi-pie-chart icon"></i>
                睡眠质量分布
            </a>
        </li>
        <li>
            <a href="/sleep/map">
                <i class="bi bi-globe-americas icon"></i>
                全球分布图
            </a>
        </li>
        <li>
            <a href="/sleep/heatmap">
                <i class="bi bi-grid-3x3-gap icon"></i>
                热力图分析
            </a>
        </li>
        <li>
            <a href="/sleep/medical-behavior">
                <i class="bi bi-heart-pulse icon"></i>
                医疗行为分析
            </a>
        </li>
        <li>
            <a href="/sleep/xgboost">
                <i class="bi bi-cpu icon"></i>
                模型预测
            </a>
        </li>
        <li>
            <a href="/sleep/comparison">
                <i class="bi bi-bar-chart-steps icon"></i>
                维度对比分析
            </a>
        </li>
    </ul>
</div>

<!-- 顶部导航栏 -->
<nav class="navbar">
    <a class="navbar-brand" href="#">
        <i class="bi bi-moon-stars"></i> 睡眠健康分析平台
    </a>
    <span class="navbar-text">
            <i class="bi bi-person-circle"></i> 睡前行为及摄入情况
        </span>
</nav>

<!-- 主展示区 -->
<div class="main-content">
    <div class="page-header">
        <h1 class="page-title">临床不良习惯与睡眠潜在关联图</h1>
        <p class="page-subtitle">睡前行为（看屏/饮酒/摄入咖啡因）对入睡潜伏期的影响</p>
    </div>

    <div class="chart-card">
        <!-- 给 Echarts 准备的空白帆布 -->
        <div id="medicalChart" style="width: 100%; height: 600px;"></div>
    </div>
</div>

<!-- 引入基础 JS -->
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/jquery-3.4.1.min.js}"></script>
<script th:src="@{/js/echarts.min.js}"></script>

<!-- ⭐ 引入我们刚才单独封装的业务 JS 文件 -->
<script th:src="@{/js/medical-behavior.js}"></script>
</body>
</html>
