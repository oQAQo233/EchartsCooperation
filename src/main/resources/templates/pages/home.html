<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠健康分析平台</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/home.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #ffffff; }

        #noise-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
    </style>
</head>
<body>
    <!-- <canvas id="noise-canvas"></canvas> -->

    <!-- Content overlay -->
    <div class="content-overlay">
        <!-- Title section -->
        <div class="title-section">
            <h1 class="main-title">
                <i class="bi bi-moon-stars"></i>
                睡眠健康分析平台
            </h1>
            <p class="subtitle">Sleep Health Analysis Platform</p>
        </div>

        <!-- Navigation cards grid -->
        <div class="nav-grid">
            <a href="/sleep/dashboard" class="nav-card">
                <div class="nav-icon" style="background: rgba(99, 102, 241, 0.15); color: #6366f1;">
                    <i class="bi bi-grid-1x2"></i>
                </div>
                <h3>数据仪表盘</h3>
                <p>多维度数据可视化</p>
            </a>

            <a href="/sleep/distribution" class="nav-card">
                <div class="nav-icon" style="background: rgba(139, 92, 246, 0.15); color: #8b5cf6;">
                    <i class="bi bi-pie-chart"></i>
                </div>
                <h3>睡眠质量分布</h3>
                <p>分布分析</p>
            </a>

            <a href="/sleep/map" class="nav-card">
                <div class="nav-icon" style="background: rgba(245, 158, 11, 0.15); color: #f59e0b;">
                    <i class="bi bi-globe-americas"></i>
                </div>
                <h3>全球分布图</h3>
                <p>地理维度展示</p>
            </a>

            <a href="/sleep/sleep-structure" class="nav-card">
                <div class="nav-icon" style="background: rgba(239, 68, 68, 0.15); color: #ef4444;">
                    <i class="bi bi-activity"></i>
                </div>
                <h3>睡眠结构分析</h3>
                <p>年龄段睡眠结构</p>
            </a>

            <a href="/sleep/heatmap" class="nav-card">
                <div class="nav-icon" style="background: rgba(236, 72, 153, 0.15); color: #ec4899;">
                    <i class="bi bi-grid-3x3"></i>
                </div>
                <h3>热力图分析</h3>
                <p>多维度热力图</p>
            </a>

            <a href="/sleep/medical-behavior" class="nav-card">
                <div class="nav-icon" style="background: rgba(14, 165, 233, 0.15); color: #0ea5e9;">
                    <i class="bi bi-heart-pulse"></i>
                </div>
                <h3>医疗行为分析</h3>
                <p>行为对睡眠影响</p>
            </a>

            <a href="/sleep/comparison" class="nav-card">
                <div class="nav-icon" style="background: rgba(99, 102, 241, 0.15); color: #6366f1;">
                    <i class="bi bi-bar-chart-steps icon"></i>
                </div>
                <h3>维度对比分析</h3>
                <p>各区间人数及指标对比</p>
            </a>

            <a href="/sleep/xgboost" class="nav-card">
                <div class="nav-icon" style="background: rgba(34, 197, 94, 0.15); color: #22c55e;">
                    <i class="bi bi-cpu"></i>
                </div>
                <h3>模型预测</h3>
                <p>XGBoost 机器学习</p>
            </a>
        </div>
    </div>
</body>
</html>
