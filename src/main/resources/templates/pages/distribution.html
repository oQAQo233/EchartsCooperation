<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠质量分布 - 睡眠健康分析平台</title>

    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <link th:href="@{/css/distribution.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
</head>
<body>

    <div class="sidebar">
        <ul class="sidebar-menu">
            <li>
                <a href="/sleep/dashboard">
                    <i class="bi bi-grid-1x2 icon"></i>
                    数据仪表盘
                </a>
            </li>
            <li>
                <a href="/sleep/distribution" class="active">
                    <i class="bi bi-pie-chart icon"></i>
                    睡眠质量分布
                </a>
            </li>
            <li>
                <a href="/sleep/map">
                    <i class="bi bi-globe-americas icon"></i>
                    全球分布图
                </a>
            </li>
            <li>
                <a href="/sleep/heatmap">
                    <i class="bi bi-grid-3x3-gap icon"></i>
                    热力图分析
                </a>
            </li>
            <li>
                <a href="/sleep/medical-behavior">
                    <i class="bi bi-heart-pulse icon"></i>
                    医疗行为分析
                </a>
            </li>
            <li>
                <a href="/sleep/xgboost">
                    <i class="bi bi-cpu icon"></i>
                    模型预测
                </a>
            </li>
            <li>
                <a href="/sleep/comparison">
                    <i class="bi bi-bar-chart-steps icon"></i>
                    维度对比分析
                </a>
            </li>
        </ul>
    </div>

    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <i class="bi bi-moon-stars"></i>
            睡眠健康分析平台
        </a>
        <span class="navbar-text">
            <i class="bi bi-person-circle"></i> 欢迎使用数据分析系统
        </span>
    </nav>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">睡眠质量分布</h1>
            <p class="page-subtitle">多维度嵌套环形图分析</p>
        </div>

        <div class="distribution-controls">
            <div class="tab-group">
                <label class="tab-label">维度</label>
                <div class="tab-buttons" id="innerTabs">
                    <button class="tab-btn active" data-type="age">年龄段</button>
                    <button class="tab-btn" data-type="gender">性别</button>
                    <button class="tab-btn" data-type="occupation">职业</button>
                    <button class="tab-btn" data-type="bmi">BMI区间</button>
                    <button class="tab-btn" data-type="country">国家</button>
                </div>
            </div>

            <div class="tab-group">
                <label class="tab-label">指标</label>
                <div class="tab-buttons" id="outerTabs">
                    <button class="tab-btn active" data-type="sleepDuration">睡眠时长区间</button>
                    <button class="tab-btn" data-type="sleepQuality">睡眠质量评分区间</button>
                    <button class="tab-btn" data-type="remPercentage">REM睡眠占比区间</button>
                    <button class="tab-btn" data-type="deepSleep">深度睡眠占比区间</button>
                    <button class="tab-btn" data-type="sleepLatency">入睡潜伏期区间</button>
                    <button class="tab-btn" data-type="wakeEpisodes">夜间觉醒次数</button>
                </div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card full-width">
                <h3 class="chart-title">
                    <i class="bi bi-pie-chart-fill"></i>
                    <span id="chartTitle">年龄段 - 睡眠时长区间</span>
                </h3>
                <div class="chart-container" id="distributionChart" style="height: 600px;"></div>
            </div>

            <div class="chart-card full-width" id="draggedBarCard">
                <h3 class="chart-title">
                    <i class="bi bi-bar-chart-fill"></i>
                    <span>已拖拽数据</span>
                </h3>
                <div class="bar-chart-container" id="draggedBarChart" style="height: 300px;"></div>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/jquery-3.4.1.min.js}"></script>
    <script th:src="@{/js/echarts.min.js}"></script>
    <script th:src="@{/js/distribution.js}"></script>
</body>
</html>
