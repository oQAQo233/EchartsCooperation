<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XGBoost 模型预测</title>

    <!-- Bootstrap 5 -->
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">

    <!-- 自定义样式 -->
    <link th:href="@{/css/custom.css}" rel="stylesheet">

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li>
                <a href="/sleep/dashboard">
                    <i class="bi bi-grid-1x2 icon"></i>
                    数据仪表盘
                </a>
            </li>
            <li>
                <a href="/sleep/distribution">
                    <i class="bi bi-pie-chart icon"></i>
                    睡眠质量分布
                </a>
            </li>
            <li>
                <a href="/sleep/map">
                    <i class="bi bi-globe-americas icon"></i>
                    全球分布图
                </a>
            </li>
            <li>
                <a href="/sleep/sleep-structure">
                    <i class="bi bi-activity icon"></i>
                    睡眠结构分析
                </a>
            </li>
            <li>
                <a href="/sleep/heatmap">
                    <i class="bi bi-grid-3x3-gap icon"></i>
                    热力图分析
                </a>
            </li>
            <li>
                <a href="/sleep/medical-behavior">
                    <i class="bi bi-heart-pulse icon"></i>
                    医疗行为分析
                </a>
            </li>
            <li>
                <a href="/sleep/comparison">
                    <i class="bi bi-bar-chart-steps icon"></i>
                    维度对比分析
                </a>
            </li>
            <li>
                <a href="#" class="active">
                    <i class="bi bi-cpu icon"></i>
                    模型预测
                </a>
            </li>
        </ul>
    </div>

<!-- 导航栏 -->
<nav class="navbar">
    <a class="navbar-brand" href="/">
        <i class="bi bi-moon-stars"></i>
        睡眠健康分析平台
    </a>
    <span class="navbar-text">
            <i class="bi bi-person-circle"></i> 欢迎使用数据分析系统
        </span>
</nav>

<!-- 主内容区 -->
<div class="main-content">
    <!-- 页面标题 -->
    <div class="page-header">
        <h1 class="page-title">模型预测</h1>
        <p class="page-subtitle">基于 XGBoost 的睡眠健康指标预测</p>
    </div>

    <!-- 预测卡片 -->
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="chart-card">
                <h3 class="chart-title">
                    <i class="bi bi-cpu"></i> XGBoost 模型预测
                </h3>
                <div class="p-3">

                    <!-- 模型选择及评估按钮 -->
                    <div class="mb-3">
                        <label for="modelSelect" class="form-label">选择模型</label>
                        <div class="d-flex align-items-end gap-2">
                            <select id="modelSelect" class="form-select" style="max-width: 800px; flex-grow: 1;">
                                <option value="">-- 请选择模型 --</option>
                            </select>
                            <button id="evalBtn" class="btn btn-outline-info" disabled
                                    style="min-width: 150px;"
                                    title="分析模型中每个特征的作用">
                                <i class="bi bi-bar-chart-fill"></i> 特征分析
                            </button>
                        </div>
                    </div>

                    <!-- 动态特征输入区域 -->
                    <div id="featureArea" class="mb-3"></div>

                    <!-- 预测按钮与结果 -->
                    <div class="d-flex align-items-center flex-wrap gap-2 justify-content-center">
                        <button id="predictBtn" class="btn btn-success" disabled>开始预测</button>
                        <div id="resultArea" class="ms-3 fw-bold"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/jquery-3.4.1.min.js}"></script>
<script>
    $(document).ready(function() {

        // 加载模型列表
        $.get('/sleep/api/models', function(models) {
            var $select = $('#modelSelect');
            $.each(models, function(i, model) {
                $select.append('<option value="' + model.id + '">' + model.name + '</option>');
            });
        });

        // 模型切换：获取特征元数据并生成输入控件
        $('#modelSelect').change(function() {
            var modelId = $(this).val();
            $('#featureArea').empty();
            $('#resultArea').empty();
            $('#predictBtn').prop('disabled', true);

            // 控制评估按钮状态
            if (modelId) {
                $('#evalBtn').prop('disabled', false);
            } else {
                $('#evalBtn').prop('disabled', true);
            }

            if (!modelId) return;

            $.get('/sleep/api/model/features', { modelId: modelId }, function(features) {
                var html = '';
                $.each(features, function(i, f) {
                    html += '<div class="row mb-2 align-items-center">';
                    html += '<label class="col-sm-3 col-form-label text-end">' + f.name + '</label>';
                    html += '<div class="col-sm-6">';
                    if (f.type === 'categorical') {
                        html += '<select class="form-select feature-input" data-feature="' + f.key + '" data-type="categorical">';
                        html += '<option value="">--请选择--</option>';
                        $.each(f.options, function(j, opt) {
                            html += '<option value="' + opt.value + '">' + opt.label + '</option>';
                        });
                        html += '</select>';
                    } else {
                        html += '<input type="text" class="form-control feature-input" data-feature="' + f.key + '" data-type="numeric" placeholder="请输入数值">';
                    }
                    html += '</div>';
                    html += '<div class="col-sm-3"><span class="text-danger validation-msg"></span></div>';
                    html += '</div>';
                });
                $('#featureArea').html(html);
                $('#predictBtn').prop('disabled', false);
            }).fail(function() {
                alert('获取特征失败，请重试');
            });
        });

        // 前端校验：失焦时检查
        $(document).on('blur', '.feature-input', function() {
            var $input = $(this);
            var type = $input.data('type');
            var val = $input.val().trim();
            var $msg = $input.closest('.row').find('.validation-msg');
            $input.removeClass('is-invalid is-valid');
            $msg.text('');

            if (val === '') {
                $msg.text('不能为空');
                $input.addClass('is-invalid');
            } else if (type === 'numeric') {
                if (isNaN(val) || val === '') {
                    $msg.text('请输入有效数字');
                    $input.addClass('is-invalid');
                } else {
                    $input.addClass('is-valid');
                }
            } else {
                // 分类选择只要非空即有效
                $input.addClass('is-valid');
            }
        });

        // 预测按钮
        $('#predictBtn').click(function() {
            // 触发所有输入校验
            var hasError = false;
            $('.feature-input').each(function() {
                $(this).trigger('blur');
                if ($(this).hasClass('is-invalid')) {
                    hasError = true;
                }
            });
            if (hasError) {
                alert('请修正输入错误后再预测');
                return;
            }

            var modelId = $('#modelSelect').val();
            var features = {};
            $('.feature-input').each(function() {
                var key = $(this).data('feature');
                features[key] = $(this).val().trim();
            });

            $('#predictBtn').prop('disabled', true).text('预测中...');
            $('#resultArea').text('');

            $.ajax({
                url: '/sleep/api/predict',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    modelId: modelId,
                    features: features
                }),
                success: function(res) {
                    if (res.success) {
                        var display = '预测结果: ';
                        if (res.predictionLabel) {
                            display += '<span class="text-success">' + res.predictionLabel + '</span>';
                        } else {
                            display += '<span class="text-success">' + res.prediction + '</span>';
                        }
                        $('#resultArea').html(display);
                    } else {
                        $('#resultArea').html('<span class="text-danger">预测失败</span>');
                    }
                },
                error: function(xhr) {
                    var msg = '未知错误';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        msg = xhr.responseJSON.message;
                    }
                    $('#resultArea').html('<span class="text-danger">' + msg + '</span>');
                },
                complete: function() {
                    $('#predictBtn').prop('disabled', false).text('开始预测');
                }
            });
        });

        // 评估按钮跳转
        $('#evalBtn').click(function() {
            var modelId = $('#modelSelect').val();
            if (modelId) {
                window.location.href = '/sleep/evaluation?model=' + encodeURIComponent(modelId);
            }
        });
    });
</script>
</body>
</html>
