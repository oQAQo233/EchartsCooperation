<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠健康记录</title>

    <!-- Bootstrap 5 -->
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">

    <!-- 自定义样式 -->
    <link th:href="@{/css/custom.css}" rel="stylesheet">

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li>
                <a href="/sleep/dashboard">
                    <i class="bi bi-grid-1x2 icon"></i>
                    数据仪表盘
                </a>
            </li>
            <li>
                <a href="#" class="active">
                    <i class="bi bi-table icon"></i>
                    数据记录表
                </a>
            </li>
            <li>
                <a href="/sleep/map">
                    <i class="bi bi-globe-americas icon"></i>
                    全球分布图
                </a>
            </li>
        </ul>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <i class="bi bi-moon-stars"></i>
            睡眠健康分析平台
        </a>
        <span class="navbar-text">
            <i class="bi bi-person-circle"></i> 欢迎使用数据分析系统
        </span>
    </nav>



    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">数据记录表</h1>
            <p class="page-subtitle">睡眠健康数据详细记录</p>
        </div>

        <!-- 数据表格 -->
        <div class="table-card">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>年龄</th>
                        <th>性别</th>
                        <th>职业</th>
                        <th>睡眠时长</th>
                        <th>睡眠质量</th>
                        <th>压力指数</th>
                        <th>作息类型</th>
                        <th>风险等级</th>
                        <th>国家</th>
                    </tr>
                </thead>
                <tbody id="recordsBody">
                    <tr>
                        <td colspan="10" class="loading">加载中</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/jquery-3.4.1.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/records.js}"></script>
</body>
</html>
