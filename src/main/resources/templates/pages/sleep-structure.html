<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不同人群睡眠结构与睡眠质量分析</title>

    <!-- Bootstrap 5 -->
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">

    <!-- 自定义样式 -->
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <link th:href="@{/css/sleep-structure.css}" rel="stylesheet">

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li>
                <a href="/sleep/dashboard">
                    <i class="bi bi-grid-1x2 icon"></i>
                    数据仪表盘
                </a>
            </li>
            <li>
                <a href="/sleep/distribution">
                    <i class="bi bi-pie-chart icon"></i>
                    睡眠质量分布
                </a>
            </li>
            <li>
                <a href="/sleep/map">
                    <i class="bi bi-globe-americas icon"></i>
                    全球分布图
                </a>
            </li>
            <li>
                <a href="/sleep/heatmap">
                    <i class="bi bi-grid-3x3-gap icon"></i>
                    热力图分析
                </a>
            </li>
            <li>
                <a href="/sleep/medical-behavior">
                    <i class="bi bi-heart-pulse icon"></i>
                    医疗行为分析
                </a>
            </li>
            <li>
                <a href="/sleep/xgboost">
                    <i class="bi bi-cpu icon"></i>
                    模型预测
                </a>
            </li>
            <li>
                <a href="/sleep/comparison">
                    <i class="bi bi-bar-chart-steps icon"></i>
                    维度对比分析
                </a>
            </li>
            <li>
                <a href="/sleep/timeline">
                    <i class="bi bi-activity icon"></i>
                    时间轴分析
                </a>
            </li>
            <li>
                <a href="/sleep/sankey">
                    <i class="bi bi-diagram-3 icon"></i>
                    桑基图分析
                </a>
            </li>
            <li>
                <a href="/sleep/sleep-structure" class="active">
                    <i class="bi bi-bar-chart-steps icon"></i>
                    睡眠结构分析
                </a>
            </li>
        </ul>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <i class="bi bi-moon-stars"></i>
            睡眠健康分析平台
        </a>
        <span class="navbar-text">
            <i class="bi bi-person-circle"></i> 欢迎使用数据分析系统
        </span>
    </nav>

    <!-- 主内容区 -->
    <div class="main-content sleep-structure-page">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">不同人群睡眠结构与睡眠质量分析</h1>
            <p class="page-subtitle" id="ageRangeText">年龄范围 <span th:text="${minAge}">0</span>-<span th:text="${maxAge}">100</span> 岁</p>
        </div>

        <!-- 主图表区域 -->
        <div class="sleep-structure-container">
            <!-- 分类选择区域 -->
            <div class="category-legend">
                <span class="category-label">分类显示：</span>
                <div class="category-legend-item active" data-category="gender">
                    <span class="category-dot" style="background: #6366f1;"></span>
                    <span class="category-text">性别</span>
                </div>
                <div class="category-legend-item active" data-category="chronotype">
                    <span class="category-dot" style="background: #8b5cf6;"></span>
                    <span class="category-text">睡眠类型</span>
                </div>
                <div class="category-legend-item active" data-category="mentalHealth">
                    <span class="category-dot" style="background: #10b981;"></span>
                    <span class="category-text">心理健康</span>
                </div>
            </div>
            <div class="sleep-structure-chart" id="sleepStructureChart"></div>
        </div>

        <!-- 底部年龄滑块 -->
        <div class="age-slider-container">
            <div class="slider-controls">
                <span class="age-label" id="currentAgeRange">全年龄段</span>
            </div>
            <div id="ageSlider"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/jquery-3.4.1.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/echarts.min.js}"></script>
    <script th:src="@{/js/sleepStructureChart.js}"></script>
</body>
</html>
