<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球睡眠数据分布</title>

    <!-- Bootstrap 5 -->
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">

    <!-- 自定义样式 -->
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <link th:href="@{/css/map.css}" rel="stylesheet">

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <i class="bi bi-globe-americas"></i>
            全球睡眠数据分布
        </a>
        <span class="navbar-text">
            <i class="bi bi-person-circle"></i> 睡眠健康分析平台
        </span>
    </nav>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li>
                <a href="/sleep/dashboard">
                    <i class="bi bi-grid-1x2 icon"></i>
                    数据仪表盘
                </a>
            </li>
            <li>
                <a href="/sleep/records">
                    <i class="bi bi-table icon"></i>
                    数据记录表
                </a>
            </li>
            <li>
                <a href="#" class="active">
                    <i class="bi bi-globe-americas icon"></i>
                    全球分布图
                </a>
            </li>
        </ul>
    </div>

    <!-- 主内容区 -->
    <div class="main-content map-page">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">全球睡眠数据分布</h1>
            <p class="page-subtitle">按国家/地区统计睡眠健康数据</p>
        </div>

        <!-- 统计信息 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="countryCount">-</div>
                <div class="label">国家/地区数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalRecords">-</div>
                <div class="label">总记录数</div>
            </div>
        </div>

        <!-- 地图容器 -->
        <div class="map-container">
            <div id="worldMapContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 提示信息 -->
        <div class="map-note">
            <i class="bi bi-info-circle"></i>
            滚轮可以缩放地图，点击国家查看详细信息，支持拖拽移动，拖动左下三角可调整显示范围。
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/jquery-3.4.1.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/echarts.min.js}"></script>
    <script th:src="@{/js/worldMap.js}"></script>
</body>
</html>
