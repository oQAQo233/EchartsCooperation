<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠热力图分析</title>

    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="#">
        <i class="bi bi-grid-3x3-gap"></i>
        睡眠热力图分析
    </a>
    <span class="navbar-text">
        <i class="bi bi-person-circle"></i> 睡眠健康分析平台
    </span>
</nav>

<div class="sidebar">
    <ul class="sidebar-menu">
        <li><a href="/sleep/dashboard"><i class="bi bi-grid-1x2 icon"></i>数据仪表盘</a></li>
        <li><a href="/sleep/records"><i class="bi bi-table icon"></i>数据记录表</a></li>
        <li><a href="/sleep/distribution"><i class="bi bi-pie-chart icon"></i>睡眠质量分布</a></li>
        <li><a href="#" class="active"><i class="bi bi-grid-3x3-gap icon"></i>热力图</a></li>
        <li><a href="/sleep/map"><i class="bi bi-globe-americas icon"></i>全球分布图</a></li>
        <li><a href="/sleep/xgboost"><i class="bi bi-cpu icon"></i>模型预测</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="page-header">
        <h1 class="page-title">热力图分析</h1>
        <p class="page-subtitle">自定义分桶（Range）二维统计（Count）</p>
    </div>

    <!-- 自定义分桶面板 -->
    <div class="chart-card full-width" style="margin-bottom: 16px;">
        <h3 class="chart-title">
            <i class="bi bi-sliders"></i> 自定义分桶（Range）
        </h3>

        <!-- 预设按钮：替代以前的 type 下拉 -->
        <div class="d-flex flex-wrap gap-2 mb-2">
            <button class="btn btn-sm btn-outline-primary" id="preset_duration_quality">睡眠时长 × 睡眠质量</button>
            <button class="btn btn-sm btn-outline-primary" id="preset_stress_quality">压力 × 睡眠质量</button>
            <button class="btn btn-sm btn-outline-primary" id="preset_latency_wake">入睡潜伏 × 夜醒次数</button>
            <button class="btn btn-sm btn-outline-primary" id="preset_temp_quality">温度 × 睡眠质量</button>
            <button class="btn btn-sm btn-outline-primary" id="preset_weekenddiff_quality">周末差异 × 睡眠质量</button>
        </div>

        <div class="row g-2 align-items-end">
            <div class="col-12 col-md-3">
                <label class="form-label mb-1">X 字段</label>
                <select id="xField" class="form-select form-select-sm">
                    <option value="sleep_duration_hrs">sleep_duration_hrs（睡眠时长/小时）</option>
                    <option value="sleep_quality_score">sleep_quality_score（睡眠质量/1-10）</option>
                    <option value="stress_score">stress_score（压力/1-10）</option>
                    <option value="room_temperature_celsius">room_temperature_celsius（温度/℃）</option>
                    <option value="weekend_sleep_diff_hrs">weekend_sleep_diff_hrs（周末差异/小时）</option>
                    <option value="sleep_latency_mins">sleep_latency_mins（入睡潜伏/分钟）</option>
                    <option value="wake_episodes_per_night">wake_episodes_per_night（夜醒次数）</option>
                    <option value="bmi">bmi</option>
                    <option value="heart_rate_resting_bpm">heart_rate_resting_bpm（安静心率）</option>
                    <option value="age">age（年龄）</option>
                </select>
            </div>

            <div class="col-4 col-md-1">
                <label class="form-label mb-1">X 起</label>
                <input id="xStart" type="number" step="any" class="form-control form-control-sm">
            </div>
            <div class="col-4 col-md-1">
                <label class="form-label mb-1">X 止</label>
                <input id="xEnd" type="number" step="any" class="form-control form-control-sm">
            </div>
            <div class="col-4 col-md-1">
                <label class="form-label mb-1">X 步长</label>
                <input id="xStep" type="number" step="any" class="form-control form-control-sm">
            </div>

            <div class="col-12 col-md-3">
                <label class="form-label mb-1">Y 字段</label>
                <select id="yField" class="form-select form-select-sm">
                    <option value="sleep_quality_score">sleep_quality_score（睡眠质量/1-10）</option>
                    <option value="sleep_duration_hrs">sleep_duration_hrs（睡眠时长/小时）</option>
                    <option value="stress_score">stress_score（压力/1-10）</option>
                    <option value="room_temperature_celsius">room_temperature_celsius（温度/℃）</option>
                    <option value="weekend_sleep_diff_hrs">weekend_sleep_diff_hrs（周末差异/小时）</option>
                    <option value="sleep_latency_mins">sleep_latency_mins（入睡潜伏/分钟）</option>
                    <option value="wake_episodes_per_night">wake_episodes_per_night（夜醒次数）</option>
                    <option value="bmi">bmi</option>
                    <option value="heart_rate_resting_bpm">heart_rate_resting_bpm（安静心率）</option>
                    <option value="age">age（年龄）</option>
                </select>
            </div>

            <div class="col-4 col-md-1">
                <label class="form-label mb-1">Y 起</label>
                <input id="yStart" type="number" step="any" class="form-control form-control-sm">
            </div>
            <div class="col-4 col-md-1">
                <label class="form-label mb-1">Y 止</label>
                <input id="yEnd" type="number" step="any" class="form-control form-control-sm">
            </div>
            <div class="col-4 col-md-1">
                <label class="form-label mb-1">Y 步长</label>
                <input id="yStep" type="number" step="any" class="form-control form-control-sm">
            </div>

            <div class="col-12 d-flex gap-2 mt-2">
                <button id="applyRange" class="btn btn-sm btn-primary">
                    <i class="bi bi-play-fill"></i> 应用
                </button>
                <span class="small text-muted align-self-center">
                    区间左闭右开：[start, end)。每轴最多 200 桶（后端限制）。
                </span>
            </div>
        </div>
    </div>

    <!-- 图表 -->
    <div class="chart-card full-width">
        <h3 class="chart-title mb-2">
            <i class="bi bi-thermometer-half"></i>
            <span id="heatmapTitle">热力图</span>
        </h3>
        <div class="chart-container" id="heatmapChart" style="height: 620px;"></div>
    </div>

    <div class="map-note" style="margin-top: 16px;">
        <i class="bi bi-info-circle"></i>
        提示：颜色越深表示该区间组合的人数越多；鼠标悬停可查看详细数值。
    </div>
</div>

<script th:src="@{/js/jquery-3.4.1.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/echarts.min.js}"></script>
<script th:src="@{/js/heatmap.js}"></script>
</body>
</html>
