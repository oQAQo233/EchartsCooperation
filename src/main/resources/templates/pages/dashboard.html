<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠健康数据仪表盘</title>

    <!-- Bootstrap 5 -->
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">

    <!-- 自定义样式 -->
    <link th:href="@{/css/custom.css}" rel="stylesheet">

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li>
                <a href="#" class="active">
                    <i class="bi bi-grid-1x2 icon"></i>
                    数据仪表盘
                </a>
            </li>
            <li>
                <a href="/sleep/distribution">
                    <i class="bi bi-pie-chart icon"></i>
                    睡眠质量分布
                </a>
            </li>
            <li>
                <a href="/sleep/map">
                    <i class="bi bi-globe-americas icon"></i>
                    全球分布图
                </a>
            </li>
            <li>
                <a href="/sleep/sleep-structure">
                    <i class="bi bi-activity icon"></i>
                    睡眠结构分析
                </a>
            </li>
            <li>
                <a href="/sleep/heatmap">
                    <i class="bi bi-grid-3x3-gap icon"></i>
                    热力图分析
                </a>
            </li>
            <li>
                <a href="/sleep/medical-behavior">
                    <i class="bi bi-heart-pulse icon"></i>
                    医疗行为分析
                </a>
            </li>
            <li>
                <a href="/sleep/comparison">
                    <i class="bi bi-bar-chart-steps icon"></i>
                    维度对比分析
                </a>
            </li>
            <li>
                <a href="/sleep/xgboost">
                    <i class="bi bi-cpu icon"></i>
                    模型预测
                </a>
            </li>
        </ul>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a class="navbar-brand" href="/">
            <i class="bi bi-moon-stars"></i>
            睡眠健康分析平台
        </a>
        <span class="navbar-text">
            <i class="bi bi-person-circle"></i> 欢迎使用数据分析系统
        </span>
    </nav>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">数据仪表盘</h1>
            <p class="page-subtitle">睡眠健康数据可视化分析</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon blue">
                    <i class="bi bi-people"></i>
                </div>
                <div class="value" id="totalRecords">-</div>
                <div class="label">总记录数</div>
            </div>
            <div class="stat-card">
                <div class="icon green">
                    <i class="bi bi-clock"></i>
                </div>
                <div class="value" id="avgSleepDuration">-</div>
                <div class="label">平均睡眠时长</div>
            </div>
            <div class="stat-card">
                <div class="icon purple">
                    <i class="bi bi-star"></i>
                </div>
                <div class="value" id="avgSleepQuality">-</div>
                <div class="label">平均睡眠质量</div>
            </div>
            <div class="stat-card">
                <div class="icon orange">
                    <i class="bi bi-lightning"></i>
                </div>
                <div class="value" id="avgStressScore">-</div>
                <div class="label">平均压力指数</div>
            </div>
        </div>

        <!-- 图表网格 -->
        <div class="charts-grid">
            <!-- 年龄分布 -->
            <div class="chart-card">
                <h3 class="chart-title">
                    <i class="bi bi-bar-chart"></i> 年龄分布
                </h3>
                <div class="chart-container" id="ageDistributionChart"></div>
            </div>

            <!-- 睡眠障碍风险 -->
            <div class="chart-card">
                <h3 class="chart-title">
                    <i class="bi bi-pie-chart"></i> 睡眠障碍风险分布
                </h3>
                <div class="chart-container" id="disorderRiskChart"></div>
            </div>

            <!-- 职业睡眠时长 -->
            <div class="chart-card">
                <h3 class="chart-title">
                    <i class="bi bi-briefcase"></i> 各职业平均睡眠时长
                </h3>
                <div class="chart-container" id="occupationChart"></div>
            </div>

            <!-- 睡眠时长 vs 质量 -->
            <div class="chart-card">
                <h3 class="chart-title">
                    <i class="bi bi-scatter-chart"></i> 睡眠时长与质量关系
                </h3>
                <div class="chart-container" id="durationQualityChart"></div>
            </div>

            <!-- 压力分布 -->
            <div class="chart-card full-width">
                <h3 class="chart-title">
                    <i class="bi bi-graph-up"></i> 压力指数分布
                </h3>
                <div class="chart-container" id="stressChart"></div>
            </div>

            <!-- 作息类型与睡眠质量 -->
            <div class="chart-card full-width">
                <h3 class="chart-title">
                    <i class="bi bi-activity"></i> 不同作息类型的睡眠质量
                </h3>
                <div class="chart-container" id="chronotypeChart"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/jquery-3.4.1.min.js}"></script>
    <script th:src="@{/js/echarts.min.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
